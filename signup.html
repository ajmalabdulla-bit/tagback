<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - TagBack</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
width:90%;
max-width:380px;
background:#1e293b;
padding:30px;
border-radius:18px;
}

h1{
text-align:center;
color:#22c55e;
margin-bottom:10px;
}

p{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.link{
margin-top:18px;
text-align:center;
}

a{
color:#22c55e;
text-decoration:none;
}
</style>

</head>

<body>

<div class="card">

<h1>TagBack</h1>

<p>Create Your Account</p>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button id="signupBtn">Create Account</button>

<div class="link">

<a href="login.html">Already have an account? Login</a>

</div>

</div>

</body>
</html>
