<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - TagBack</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
width:90%;
max-width:380px;
background:#1e293b;
padding:30px;
border-radius:18px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
text-align:center;
color:#22c55e;
margin-bottom:10px;
}

p{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#16a34a;
}

.link{
margin-top:18px;
text-align:center;
}

a{
color:#22c55e;
text-decoration:none;
}

#message{
margin-top:15px;
text-align:center;
font-size:15px;
}
</style>

</head>
<body>

<div class="card">

<h1>TagBack</h1>
<p>Login to your account</p>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<div id="message"></div>

<div class="link">
<a href="signup.html">Create new account</a>
</div>

</div>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
'https://jyikzrgqwtusvhprpeui.supabase.co',
'sb_publishable_OSdTgMmkzJAOYfjUxJwC4g_ZFb_QRMQ'
);

const btn=document.getElementById("loginBtn");
const message=document.getElementById("message");

btn.onclick=async()=>{

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;

message.style.color="red";

const {error}=await supabase.auth.signInWithPassword({
email,
password
});

if(error){

message.innerHTML=error.message;

}else{

message.style.color="#22c55e";
message.innerHTML="✅ Login successful...";

setTimeout(()=>{
window.location.href="dashboard.html";
},1000);

}

}

</script>

</body>
</html>
