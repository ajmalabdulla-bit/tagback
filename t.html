<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tagback</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #1B2430;
    color: #EFE9DC;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #232B38;
    border-radius: 16px;
    padding: 28px;
  }
  h1 { font-size: 22px; margin: 0 0 6px; }
  p.sub { color: #8C93A3; font-size: 14px; margin: 0 0 20px; line-height: 1.5; }
  label { display: block; font-size: 12px; color: #8C93A3; margin: 14px 0 6px; }
  input, textarea, select {
    width: 100%;
    padding: 11px 12px;
    border-radius: 8px;
    border: 1px solid #333e4d;
    background: #1B2430;
    color: #EFE9DC;
    font-size: 14px;
    font-family: inherit;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 13px 0;
    border-radius: 8px;
    border: none;
    background: #C9A15D;
    color: #1B2430;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .msg { font-size: 13px; margin-top: 12px; }
  .error { color: #E08585; }
  .success { color: #9FCB8F; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">

  <script>
    const SUPABASE_URL = "https://jyikzrgqwtusvhprpeui.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5aWt6cmdxd3R1c3ZocHJwZXVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3ODkyMDUsImV4cCI6MjA5OTM2NTIwNX0.JmaJsIx90X_4IytNlBv-dzjcV3olPjUNc10w0dTrixE";
  </script>

  <div id="loading"><p class="sub">Loading…</p></div>

  <div id="registerForm" class="hidden">
    <h1>Register this tag</h1>
    <p class="sub">This is a new tag. Enter your details so a finder can reach you.</p>
    <label>What's this tag on?</label>
    <select id="itemType">
      <option>Keys</option>
      <option>Wallet</option>
      <option>Bag</option>
      <option>Backpack</option>
      <option>Suitcase</option>
      <option>Other</option>
    </select>
    <label>Your name</label>
    <input id="ownerName" placeholder="Ajmal" />
    <label>Your email</label>
    <input id="ownerEmail" placeholder="you@example.com" />
    <button onclick="registerTag()">Activate tag</button>
    <div id="registerMsg" class="msg"></div>
  </div>

  <div id="finderForm" class="hidden">
    <h1>You found someone's item</h1>
    <p class="sub" id="itemDesc"></p>
    <label>Message for the owner</label>
    <textarea id="finderMessage" rows="4" placeholder="Found this at..."></textarea>
    <label>Your contact (optional, so they can reply)</label>
    <input id="finderContact" placeholder="email or phone" />
    <button onclick="sendMessage()">Send message</button>
    <div id="finderMsg" class="msg"></div>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const tagId = params.get("id");
  let supabase;

  async function init() {
    if (typeof window.supabase === "undefined") {
      document.getElementById("loading").innerHTML =
        '<p class="error msg">Could not load Supabase library. Check your internet connection and try again.</p>';
      return;
    }

    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    if (!tagId) {
      document.getElementById("loading").innerHTML =
        '<p class="error msg">No tag ID in the link. Try scanning the QR code again.</p>';
      return;
    }

    let data, error;
    try {
      const result = await supabase
        .from("tags")
        .select("*")
        .eq("tag_id", tagId)
        .maybeSingle();
      data = result.data;
      error = result.error;
    } catch (e) {
      document.getElementById("loading").innerHTML =
        '<p class="error msg">Connection error: ' + e.message + '</p>';
      return;
    }

    if (error) {
      document.getElementById("loading").innerHTML =
        '<p class="error msg">Database error: ' + error.message + '</p>';
      return;
    }

    document.getElementById("loading").classList.add("hidden");

    if (!data) {
      document.getElementById("registerForm").classList.remove("hidden");
    } else {
      document.getElementById("itemDesc").innerText =
        "This tag belongs to a " + data.item_type.toLowerCase() +
        ". Send a message and the owner will get your contact info to arrange getting it back.";
      document.getElementById("finderForm").classList.remove("hidden");
    }
  }

  async function registerTag() {
    const item_type = document.getElementById("itemType").value;
    const owner_name = document.getElementById("ownerName").value.trim();
    const owner_email = document.getElementById("ownerEmail").value.trim();
    const msgEl = document.getElementById("registerMsg");

    if (!owner_name || !owner_email) {
      msgEl.innerHTML = '<span class="error">Add your name and email.</span>';
      return;
    }

    const { error } = await supabase.from("tags").insert({
      tag_id: tagId,
      item_type,
      owner_name,
      owner_email,
    });

    if (error) {
      msgEl.innerHTML = '<span class="error">Something went wrong. Try again.</span>';
      console.error(error);
    } else {
      msgEl.innerHTML = '<span class="success">Tag activated. You\'re all set.</span>';
    }
  }

  async function sendMessage() {
    const message = document.getElementById("finderMessage").value.trim();
    const finder_contact = document.getElementById("finderContact").value.trim();
    const msgEl = document.getElementById("finderMsg");

    if (!message) {
      msgEl.innerHTML = '<span class="error">Write a short message first.</span>';
      return;
    }

    const { error } = await supabase.from("messages").insert({
      tag_id: tagId,
      message,
      finder_contact,
    });

    if (error) {
      msgEl.innerHTML = '<span class="error">Something went wrong. Try again.</span>';
      console.error(error);
    } else {
      msgEl.innerHTML = '<span class="success">Sent. The owner will be notified.</span>';
    }
  }

  init();
</script>

</body>
</html>
