<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TagBack</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .hero{
      padding:70px 20px;
    }

    h1{
      font-size:42px;
      color:#22c55e;
    }

    p{
      margin-top:15px;
      font-size:18px;
      color:#cbd5e1;
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      margin-top:30px;
      background:#22c55e;
      color:white;
      text-decoration:none;
      padding:15px 30px;
      border-radius:10px;
      font-size:18px;
    }

    .section{
      margin-top:70px;
      padding:20px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
      margin-top:25px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
    }

    footer{
      margin-top:70px;
      padding:20px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<div class="hero">
    <h1>TagBack</h1>

    <p>
        Never lose your valuables again.<br>
        One Scan. One Chance. Get it Back.
    </p>

    <a class="btn" href="#">Get Started</a>
</div>

<div class="section">

<h2>How It Works</h2>

<div class="cards">

<div class="card">
📦<br><br>
Buy a Tag
</div>

<div class="card">
📱<br><br>
Activate It
</div>

<div class="card">
🏍️<br><br>
Attach to Item
</div>

<div class="card">
📲<br><br>
Finder Scans QR
</div>

</div>

</div>

<div class="section">

<h2>Perfect For</h2>

<div class="cards">

<div class="card">🪖 Helmet</div>
<div class="card">🎒 Bag</div>
<div class="card">🔑 Keys</div>
<div class="card">👛 Wallet</div>
<div class="card">💻 Laptop</div>
<div class="card">🐕 Pet</div>

</div>

</div>

<footer>

© 2026 TagBack

</footer>

</body>
</html>
