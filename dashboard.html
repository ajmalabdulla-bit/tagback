<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - TagBack</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
color:#22c55e;
margin-bottom:8px;
}

p{
color:#cbd5e1;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:20px;
word-break:break-all;
}

.logout{
background:#ef4444;
}
</style>

</head>
<body>

<div class="container">

<h1>TagBack Dashboard</h1>

<p>Register a new item.</p>

<div class="card">

<input id="itemName" placeholder="Item name (Helmet, Keys...)">

<select id="category">
<option>Helmet</option>
<option>Keys</option>
<option>Wallet</option>
<option>Bag</option>
<option>Phone</option>
<option>Other</option>
</select>

<button id="generateBtn">
Generate QR Tag
</button>

<div id="result"></div>
<hr style="margin:25px 0;border:1px solid #334155;">

<h2 style="margin-bottom:15px;color:#22c55e;">
My Registered Items
</h2>

<div id="itemList"></div>
</div>

<button class="logout" id="logoutBtn">
Logout
</button>

</div>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase=createClient(
'https://jyikzrgqwtusvhprpeui.supabase.co',
'sb_publishable_OSdTgMmkzJAOYfjUxJwC4g_ZFb_QRMQ'
);

const {data:{session}}=await supabase.auth.getSession();

if(!session){
location.href="document.getElementById("generateBtn").onclick = async () => {

const itemName = document.getElementById("itemName").value.trim();
const category = document.getElementById("category").value;

if(itemName===""){
document.getElementById("result").innerHTML="<p style='color:red;'>Please enter an item name.</p>";
return;
}

const qrId = crypto.randomUUID();

const { error } = await supabase
.from("items")
.insert([
{
user_id: session.user.id,
item_name: itemName,
category: category,
qr_code: qrId
}
]);

if(error){

document.getElementById("result").innerHTML =
"<p style='color:red;'>"+error.message+"</p>";

}else{

document.getElementById("result").innerHTML=`
<h3 style="color:#22c55e;">✅ Item Saved!</h3>

<p><strong>Item:</strong> ${itemName}</p>

<p><strong>Category:</strong> ${category}</p>

<p><strong>QR ID:</strong><br>${qrId}</p>
`;

document.getElementById("itemName").value="";
loadItems();
}

};

async function loadItems(){

const {data,error}=await supabase
.from("items")
.select("*")
.eq("user_id",session.user.id)
.order("created_at",{ascending:false});

const list=document.getElementById("itemList");

list.innerHTML="";

if(error){

list.innerHTML="<p style='color:red;'>"+error.message+"</p>";
return;

}

if(data.length===0){

list.innerHTML="<p>No items registered yet.</p>";
return;

}

data.forEach(item=>{

list.innerHTML+=`
<div style="
background:#334155;
padding:15px;
border-radius:12px;
margin-bottom:12px;
">

<h3>${item.item_name}</h3>

<p>Category: ${item.category}</p>

<p style="font-size:13px;">
QR ID:
<br>
${item.qr_code}
</p>

</div>
`;

});

}

loadItems();
document.getElementById("logoutBtn").onclick=async()=>{

await supabase.auth.signOut();

location.href="login.html";

}

</script>

</body>
</html>
